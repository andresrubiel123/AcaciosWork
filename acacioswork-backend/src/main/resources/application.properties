# Configuración de base de datos y servidor. @author RADJ
spring.application.name=acacioswork-backend

# Base de datos
# Base de datos (MySQL Local)
spring.datasource.url=jdbc:mysql://${DB_HOST:localhost}:${DB_PORT:3306}/tienda_acacios?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=${DB_USER:root}
spring.datasource.password=${DB_PASSWORD:}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver


logging.level.org.springframework.web=DEBUG
logging.level.org.springframework.security=INFO
# Inicialización con scripts SQL
spring.sql.init.mode=never
spring.sql.init.schema-locations=classpath:acacioswork_bd_big.sql
spring.sql.init.data-locations=classpath:04_initial_data.sql
spring.sql.init.continue-on-error=true

# JPA
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.open-in-view=false

# Servidor
server.port=8081

# Configuración de Swagger UI
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.api-docs.path=/v3/api-docs
springdoc.packages-to-scan=com.acacioswork.controller

