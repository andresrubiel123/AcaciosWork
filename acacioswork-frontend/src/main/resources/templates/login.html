<!-- Interfaz de inicio de sesión premium. @author RADJ -->
<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AcaciosWork - Login</title>
    <link rel="stylesheet" th:href="@{/css/styles.css}">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body {
            justify-content: center;
            align-items: center;
        }

        /* Botón de inicio de sesión con estilo y color del Dashboard */
        .btn-login {
            background: linear-gradient(135deg, #f97316, #ef4444) !important;
            color: white !important;
            box-shadow: 0 4px 12px rgba(239, 68, 68, 0.25);
            border: 1px solid rgba(255, 255, 255, 0.15) !important;
            transition: all 0.25s ease;
        }

        .btn-login:hover {
            box-shadow: 0 6px 16px rgba(239, 68, 68, 0.4);
            transform: translateY(-2px);
            filter: brightness(1.1);
        }

        .btn-login:active {
            transform: translateY(0);
        }

        /* Título del sistema animado idéntico al del Dashboard */
        .login-brand {
            font-weight: 700;
            font-size: 2.2rem;
            color: #39ff14;
            letter-spacing: -0.02em;
            animation: neon-pulse 2s infinite ease-in-out;
            text-align: center;
            margin-bottom: 0.5rem;
            display: block;
        }

        @keyframes neon-pulse {
            0%, 100% {
                text-shadow: 0 0 4px rgba(57, 255, 20, 0.4);
                opacity: 0.85;
            }
            50% {
                text-shadow: 0 0 12px rgba(57, 255, 20, 0.85), 0 0 20px rgba(57, 255, 20, 0.4);
                opacity: 1;
            }
        }
    </style>
</head>

<body>
    <div class="container fade-in" style="max-width: 400px;">
        <div class="card">
            <h1 class="login-brand">AcaciosWork</h1>
            <p style="margin-bottom: 2rem; text-align: center; color: var(--text-muted);">Acceso al sistema administrativo</p>

            <form id="loginForm">
                <div class="form-group">
                    <label for="username">Usuario</label>
                    <input type="text" id="username" placeholder="Ingresa tu usuario" required autocomplete="username">
                </div>

                <div class="form-group">
                    <label for="password">Contraseña</label>
                    <input type="password" id="password" placeholder="••••••••" required autocomplete="current-password">
                </div>

                <button type="submit" id="loginBtn" class="btn btn-login" style="width: 100%; margin-top: 1rem;">
                    Iniciar Sesión
                </button>
            </form>

            <p id="errorMsg"
                style="color: var(--danger); margin-top: 1.5rem; text-align: center; font-size: 0.875rem; display: none; padding: 0.75rem; background: rgba(239, 68, 68, 0.1); border-radius: 0.5rem;">
            </p>
        </div>

        <p style="margin-top: 2rem; text-align: center; color: var(--text-muted); font-size: 0.75rem;">
            &copy; 2026 AcaciosWork - Gestión de Inventario Inteligente
        </p>
    </div>

    <script th:src="@{/js/api.js}"></script>
    <script>
        /** Maneja el proceso de autenticación. @author RADJ */
        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const usuario = document.getElementById('username').value;
            const clave = document.getElementById('password').value;
            const errorMsg = document.getElementById('errorMsg');
            const loginBtn = document.getElementById('loginBtn');

            // Feedback visual
            loginBtn.innerText = "Verificando...";
            loginBtn.disabled = true;
            errorMsg.style.display = "none";

            try {
                // El backend devuelve { token, usuario } en el campo data
                const result = await apiRequest("/usuarios/login", "POST", { usuario, clave });

                // Guardar información real tras la estandarización del backend
                localStorage.setItem("jwt_token", result.token);
                localStorage.setItem("usuario", JSON.stringify(result.usuario));
                localStorage.setItem("user_name", result.usuario.nombre + " " + result.usuario.apellido);
                localStorage.setItem("user_role", result.usuario.idRol || "2");

                // Redirigir según rol: 1=Administrador, 2=Auxiliar
                if (result.usuario.idRol === 1) {
                    window.location.href = "administrador-dashboard";
                } else {
                    window.location.href = "auxiliar-dashboard";
                }
            } catch (err) {
                errorMsg.innerText = "Credenciales incorrectas o error de conexión.";
                errorMsg.style.display = "block";
                loginBtn.innerText = "Iniciar Sesión";
                loginBtn.disabled = false;
            }
        });

        // Limpiar errores al escribir
        document.querySelectorAll('input').forEach(input => {
            input.addEventListener('input', () => {
                document.getElementById('errorMsg').style.display = "none";
            });
        });
    </script>
</body>

</html>
