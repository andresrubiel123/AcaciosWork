<!-- Modales del sistema para creación, edición y visualización. @author RADJ -->
<div th:fragment="modals">
    <!-- ═══ MODAL GENÉRICO ═══ -->
    <div id="mainModal" class="modal-overlay">
        <div class="modal-content">
            <h2 id="modal-title">Nuevo Registro</h2>
            <form id="modal-form">
                <div id="modal-fields"></div>
                <div style="display:flex;gap:0.75rem;margin-top:0.5rem">
                    <button type="button" class="btn" style="flex:1;background:#334155;color:white"
                        onclick="closeModal()">Cancelar</button>
                    <button type="submit" class="btn btn-orange" style="flex:1">Guardar</button>
                </div>
            </form>
        </div>
    </div>

    <!-- ═══ MODAL DETALLES PROVEEDOR ═══ -->
    <div id="proveedorModal" class="modal-overlay">
        <div class="modal-content"
            style="max-width: 500px; background: var(--bg-card); border: 1px solid rgba(255, 255, 255, 0.08); border-radius: 1rem; padding: 2rem;">
            <h2 style="margin-bottom: 1.25rem; display: flex; align-items: center; gap: 0.5rem; color: white;">🏢
                Detalles del Proveedor</h2>
            <div id="prov-details-content"
                style="display: grid; gap: 0.85rem; font-size: 0.95rem; margin-bottom: 1.5rem; color: var(--text-muted);">
                <!-- Se poblará dinámicamente -->
            </div>
            <button type="button" class="btn btn-primary"
                style="width: 100%; padding: 0.6rem 1.2rem; border-radius: 0.5rem; border: none; font-weight: 600; cursor: pointer;"
                onclick="closeProveedorModal()">Cerrar</button>
        </div>
    </div>

    <!-- ═══ MODAL MOVIMIENTO INVENTARIO ═══ -->
    <div id="movimientoModal" class="modal-overlay">
        <div class="modal-content"
             style="max-width: 450px; background: var(--bg-card); border: 1px solid rgba(255, 255, 255, 0.08); border-radius: 1rem; padding: 2rem;">
            <h2 id="mov-modal-title" style="margin-bottom: 0.5rem; color: white;">📈 Registrar Movimiento</h2>
            <p id="mov-modal-subtitle" style="color: var(--text-muted); font-size: 0.9rem; margin-bottom: 1.5rem;"></p>
            <form id="mov-modal-form">
                <input type="hidden" id="mov-id-producto">
                <input type="hidden" id="mov-tipo">
                
                <div style="margin-bottom: 1.25rem;">
                    <label style="display: block; margin-bottom: 0.5rem; font-weight: 500; font-size: 0.9rem; color: var(--text-muted);">Cantidad (Unidades)</label>
                    <input type="number" id="mov-cantidad" min="1" placeholder="Ej: 10" required
                           style="width: 100%; padding: 0.75rem; border-radius: 0.5rem; border: 1px solid rgba(255,255,255,0.08); background: var(--bg-dark); color: var(--text-main); outline: none;">
                </div>
                
                <div style="margin-bottom: 1.25rem;">
                    <label style="display: block; margin-bottom: 0.5rem; font-weight: 500; font-size: 0.9rem; color: var(--text-muted);">Referencia (Opcional)</label>
                    <input type="text" id="mov-referencia" placeholder="Ej: Compra a proveedor, Ajuste manual"
                           style="width: 100%; padding: 0.75rem; border-radius: 0.5rem; border: 1px solid rgba(255,255,255,0.08); background: var(--bg-dark); color: var(--text-main); outline: none;">
                </div>
                
                <div style="margin-bottom: 1.5rem;">
                    <label style="display: block; margin-bottom: 0.5rem; font-weight: 500; font-size: 0.9rem; color: var(--text-muted);">Observación (Opcional)</label>
                    <input type="text" id="mov-observacion" placeholder="Detalles adicionales del movimiento"
                           style="width: 100%; padding: 0.75rem; border-radius: 0.5rem; border: 1px solid rgba(255,255,255,0.08); background: var(--bg-dark); color: var(--text-main); outline: none;">
                </div>
                
                <div style="display: flex; gap: 0.75rem;">
                    <button type="button" class="btn" style="flex: 1; background: #334155; color: white; padding: 0.75rem; border-radius: 0.5rem; border: none; font-weight: 600; cursor: pointer;"
                            onclick="closeMovimientoModal()">Cancelar</button>
                    <button type="submit" id="mov-submit-btn" class="btn" style="flex: 1; padding: 0.75rem; border-radius: 0.5rem; border: none; font-weight: 600; cursor: pointer; color: white;">Confirmar</button>
                </div>
            </form>
        </div>
    </div>

    <!-- Toast de notificación -->
    <div id="toast" class="toast"></div>
</div>
