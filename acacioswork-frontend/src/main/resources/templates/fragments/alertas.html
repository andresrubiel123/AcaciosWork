<!-- Sección de alertas de stock para el dashboard. @author RADJ -->
<div th:fragment="alertas" id="sec-alertas" class="section" style="display:none">
    <div class="section-header">
        <div>
            <h1>⚠ Alertas de Stock</h1>
            <p>Productos que requieren reabastecimiento urgente</p>
        </div>
        <div style="display:flex; gap:0.75rem;">
            <button class="btn btn-pdf" onclick="generarReporte('stock-bajo')">📄 Descargar lista PDF</button>
        </div>
    </div>
    <!-- Buscador de Alertas -->
    <div class="search-container" id="alertas-search-container"
        style="position: relative; margin-bottom: 1rem; display: none;">
        <input type="text" id="alertas-search-input" oninput="filterTable(this, 'alertas-tbody')"
            placeholder="🔍 Buscar en la tabla..."
            style="width: 100%; padding: 0.75rem 1rem; border-radius: 0.5rem; border: 1px solid rgba(255,255,255,0.08); background: var(--bg-card); color: var(--text-main); font-size: 0.9rem; outline: none; margin-bottom: 0;">
    </div>
    <div id="alertas-container">
        <p style="color:var(--text-muted)">Cargando alertas...</p>
    </div>
</div>
